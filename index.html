<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Score Tracker</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<section class="hero">

<h1>🚀 Pro Score Tracker</h1>

<p>
Track progress, analyze performance, and stay motivated.
</p>

<a href="#dashboard">
<button class="primary-btn">
Get Started
</button>
</a>

</section>

<section class="features">

<div class="feature-card">
📊 Real-Time Analytics
</div>

<div class="feature-card">
⚡ Custom Scoring
</div>

<div class="feature-card">
🏆 Achievement System
</div>

<div class="feature-card">
💾 Auto Save
</div>

</section>

<section id="dashboard" class="dashboard">

<div class="score-card">

<h2 id="score">
0.00
</h2>

<p>Current Score</p>

</div>

<div class="settings">

<input
type="number"
id="plusValue"
value="1"
step="0.01">

<input
type="number"
id="minusValue"
value="0.25"
step="0.01">

</div>

<div class="buttons">
  <div class="actions">

<button
onclick="resetScore()"
class="action-btn">
🔄 Reset
</button>

<button
onclick="undoLast()"
class="action-btn">
↩ Undo
</button>

</div>

<button
class="green-btn"
onclick="addScore()">
+
</button>

<button
class="red-btn"
onclick="subtractScore()">
-
</button>

</div>

<div class="stats">

<div class="stat">
🟢 Clicks:
<span id="greenCount">
0
</span>
</div>

<div class="stat">
🔴 Clicks:
<span id="redCount">
0
</span>
</div>

<div class="stat">
🏆
<span id="badge">
Starter
</span>
</div>

</div>

<canvas id="chart"></canvas>

</section>

<footer>

Built by Aryan Patel

</footer>

<script src="script.js"></script>

</body>
</html>

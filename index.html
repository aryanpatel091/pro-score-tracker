<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Score Tracker</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
background:linear-gradient(-45deg,#0f172a,#1e3a8a,#7c3aed,#0f172a);
background-size:400% 400%;
animation:gradient 15s ease infinite;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
overflow-x:hidden;
color:white;
}

@keyframes gradient{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.background-circle{
position:fixed;
border-radius:50%;
filter:blur(100px);
opacity:.4;
z-index:-1;
}

.circle1{
width:250px;
height:250px;
background:#22c55e;
top:-50px;
left:-50px;
}

.circle2{
width:300px;
height:300px;
background:#7c3aed;
bottom:-100px;
right:-50px;
}

.container{
width:100%;
max-width:950px;
}

.card{
background:rgba(255,255,255,.08);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.15);
border-radius:30px;
padding:30px;
box-shadow:0 20px 60px rgba(0,0,0,.35);
animation:fadeIn 1s ease;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.hero{
text-align:center;
margin-bottom:25px;
}

.hero h1{
font-size:42px;
margin-bottom:10px;
}

.hero p{
color:#d1d5db;
}

.score-box{
margin:30px auto;
padding:25px;
border-radius:25px;
background:rgba(255,255,255,.08);
text-align:center;
}

.score-value{
font-size:75px;
font-weight:700;
}

.score-label{
color:#cbd5e1;
}

.progress-container{
height:18px;
background:rgba(255,255,255,.1);
border-radius:50px;
overflow:hidden;
margin-top:20px;
}

.progress-bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#22c55e,#4ade80);
transition:.4s;
}

.settings{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:25px;
}

.setting-box{
display:flex;
flex-direction:column;
}

.setting-box label{
margin-bottom:8px;
font-size:14px;
}

.setting-box input{
padding:14px;
border:none;
border-radius:12px;
font-size:16px;
outline:none;
}

.buttons{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:25px;
}

.btn{
height:170px;
border:none;
border-radius:25px;
font-size:48px;
font-weight:700;
cursor:pointer;
color:white;
transition:.25s;
}

.btn:hover{
transform:translateY(-8px) scale(1.03);
}

.green{
background:linear-gradient(135deg,#22c55e,#15803d);
}

.red{
background:linear-gradient(135deg,#ef4444,#b91c1c);
}

.stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:25px;
}

.stat-card{
background:rgba(255,255,255,.08);
padding:20px;
border-radius:20px;
text-align:center;
}

.stat-card h2{
font-size:32px;
}

.actions{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:20px;
}

.action-btn{
padding:16px;
border:none;
border-radius:14px;
cursor:pointer;
font-size:16px;
font-weight:600;
}

.undo{
background:#facc15;
color:black;
}

.reset{
background:#e5e7eb;
color:black;
}

@media(max-width:768px){

.hero h1{
font-size:30px;
}

.score-value{
font-size:55px;
}

.settings,
.buttons,
.stats,
.actions{
grid-template-columns:1fr;
}

.btn{
height:120px;
font-size:40px;
}

}

</style>
</head>

<body>

<div class="background-circle circle1"></div>
<div class="background-circle circle2"></div>

<div class="container">

<div class="card">

<div class="hero">
<h1>🚀 Pro Score Tracker</h1>
<p>Track your performance, productivity and progress in real time.</p>
</div>

<div class="score-box">
<div class="score-value" id="score">0.00</div>
<div class="score-label">Current Score</div>

<div class="progress-container">
<div class="progress-bar" id="progressBar"></div>
</div>
</div>

<div class="settings">

<div class="setting-box">
<label>Green Button Value (+)</label>
<input type="number" id="greenValue" value="1" step="0.01">
</div>

<div class="setting-box">
<label>Red Button Value (-)</label>
<input type="number" id="redValue" value="0.25" step="0.01">
</div>

</div>

<div class="buttons">

<button class="btn green" onclick="addScore()">
+
</button>

<button class="btn red" onclick="subtractScore()">
−
</button>

</div>
<div class="stats">

<div class="stat-card">
<h2 id="greenCount">0</h2>
<p>🟢 Positive Clicks</p>
</div>

<div class="stat-card">
<h2 id="redCount">0</h2>
<p>🔴 Negative Clicks</p>
</div>

</div>

<div class="actions">

<button class="action-btn undo" onclick="undoLast()">
↩ Undo Last
</button>

<button class="action-btn reset" onclick="resetAll()">
🔄 Reset
</button>

</div>

</div>
</div>

<script>

let score = 0;
let greenClicks = 0;
let redClicks = 0;
let history = [];

function saveSettings(){

localStorage.setItem(
"greenValue",
document.getElementById("greenValue").value
);

localStorage.setItem(
"redValue",
document.getElementById("redValue").value
);

}

function loadSettings(){

let green = localStorage.getItem("greenValue");
let red = localStorage.getItem("redValue");

if(green){
document.getElementById("greenValue").value = green;
}

if(red){
document.getElementById("redValue").value = red;
}

}

function updateUI(){

document.getElementById("score").innerText =
score.toFixed(2);

document.getElementById("greenCount").innerText =
greenClicks;

document.getElementById("redCount").innerText =
redClicks;

let progress =
Math.max(0, Math.min(score,100));

document.getElementById("progressBar").style.width =
progress + "%";

saveSettings();

if(score >= 100){
launchConfetti();
}

}

function addScore(){

let value =
parseFloat(
document.getElementById("greenValue").value
) || 0;

score += value;
greenClicks++;

history.push({
type:"green",
value:value
});

updateUI();

}

function subtractScore(){

let value =
parseFloat(
document.getElementById("redValue").value
) || 0;

score -= value;
redClicks++;

history.push({
type:"red",
value:value
});

updateUI();

}

function undoLast(){

if(history.length === 0){
return;
}

let last = history.pop();

if(last.type === "green"){

score -= last.value;
greenClicks--;

}else{

score += last.value;
redClicks--;

}

updateUI();

}

function resetAll(){

if(confirm("Reset all data?")){

score = 0;
greenClicks = 0;
redClicks = 0;
history = [];

updateUI();

}

}

function launchConfetti(){

for(let i=0;i<50;i++){

let confetti =
document.createElement("div");

confetti.style.position="fixed";
confetti.style.left=Math.random()*100+"vw";
confetti.style.top="-20px";
confetti.style.width="10px";
confetti.style.height="10px";
confetti.style.background=
["#22c55e","#ef4444","#facc15","#3b82f6"]
[Math.floor(Math.random()*4)];

confetti.style.borderRadius="50%";
confetti.style.zIndex="9999";

document.body.appendChild(confetti);

let duration =
Math.random()*3000 + 2000;

confetti.animate([
{
transform:"translateY(0px)"
},
{
transform:
"translateY(120vh) rotate(720deg)"
}
],{
duration:duration
});

setTimeout(()=>{
confetti.remove();
},duration);

}

}

loadSettings();
updateUI();

</script>

</body>
</html>
